name: deploy-docs

# Build the VitePress site and publish it to GitHub Pages. On pull_request it
# runs as a gate but does NOT deploy: config.ts sets no ignoreDeadLinks, so
# VitePress fails on a dead link and a green build IS the link check.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# One deployment at a time; never cancel a running one halfway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # config.ts sets lastUpdated: true, which makes VitePress run `git log`
          # per file. The full history is required: with the default fetch-depth: 1
          # every page would show the same date in the footer and the sitemap.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    # Pull requests only validate the build; main is what gets published.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# One-time setup: in Settings -> Pages, set Source to "GitHub Actions"
# (otherwise deploy-pages fails with "Pages is not enabled for this repository").
